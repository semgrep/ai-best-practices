rules:
  - id: cohere-missing-safety-mode-python
    languages: [python]
    severity: WARNING
    message: >-
      Cohere chat called without explicit 'safety_mode' parameter. Set
      safety_mode to 'STRICT' or 'CONTEXTUAL' to explicitly configure content
      safety guardrails. See https://docs.cohere.com/docs/safety-modes
    metadata:
      category: security
      confidence: HIGH
      technology: [cohere]
    patterns:
      - pattern: $CLIENT.chat(...)
      - pattern-not: $CLIENT.chat(..., safety_mode=$SM, ...)

  - id: cohere-missing-safety-mode-javascript
    languages: [javascript, typescript]
    severity: WARNING
    message: >-
      Cohere chat called without explicit 'safety_mode' parameter. Set
      safetyMode to 'STRICT' or 'CONTEXTUAL' to explicitly configure content
      safety guardrails. See https://docs.cohere.com/docs/safety-modes
    metadata:
      category: security
      confidence: HIGH
      technology: [cohere]
    patterns:
      - pattern: "$CLIENT.chat({...})"
      - pattern-not: "$CLIENT.chat({..., safetyMode: $SM, ...})"
