rules:
  - id: openai-missing-refusal-check-python
    languages: [python]
    severity: WARNING
    message: >-
      OpenAI response content accessed without checking for refusal. The model
      may refuse requests, and accessing .content without checking .refusal
      first may lead to unexpected behavior. Check
      response.choices[0].message.refusal before accessing content.
    metadata:
      category: security
      confidence: HIGH
      technology: [openai]
    patterns:
      - pattern: $RESP.choices[0].message.content
      - pattern-not-inside: |
          if $RESP.choices[0].message.refusal:
              ...
          else:
              ...
      - pattern-not-inside: |
          if $RESP.choices[0].message.refusal is not None:
              ...
          else:
              ...
      - pattern-not-inside: |
          if not $RESP.choices[0].message.refusal:
              ...

  - id: openai-missing-refusal-check-javascript
    languages: [javascript, typescript]
    severity: WARNING
    message: >-
      OpenAI response content accessed without checking for refusal. The model
      may refuse requests, and accessing .content without checking .refusal
      first may lead to unexpected behavior. Check
      response.choices[0].message.refusal before accessing content.
    metadata:
      category: security
      confidence: HIGH
      technology: [openai]
    patterns:
      - pattern: $RESP.choices[0].message.content
      - pattern-not-inside: |
          if ($RESP.choices[0].message.refusal) {
              ...
          } else {
              ...
          }
      - pattern-not-inside: |
          if (!$RESP.choices[0].message.refusal) {
              ...
          }
